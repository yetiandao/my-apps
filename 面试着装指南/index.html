<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>面试着装指南</title>
    <style>
        /* ============================================================
           全局样式重置
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563EB;
            --primary-dark: #1D4ED8;
            --primary-light: #3B82F6;
            --secondary-color: #10B981;
            --danger-color: #EF4444;
            --warning-color: #F59E0B;
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --text-light: #94A3B8;
            --border-color: #E2E8F0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================================
           头部导航
           ============================================================ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 16px 20px;
            z-index: 100;
            box-shadow: var(--shadow-md);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 480px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vip-badge {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        /* ============================================================
           主内容区域
           ============================================================ */
        .main-content {
            padding: 76px 16px 80px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ============================================================
           搜索栏
           ============================================================ */
        .search-bar {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            color: var(--text-primary);
        }

        .search-bar input::placeholder {
            color: var(--text-light);
        }

        .search-bar .icon {
            color: var(--text-light);
        }

        /* ============================================================
           Banner区域
           ============================================================ */
        .banner {
            background: linear-gradient(135deg, var(--primary-color) 0%, #8B5CF6 100%);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .banner h2 {
            font-size: 20px;
            margin-bottom: 8px;
            position: relative;
        }

        .banner p {
            font-size: 13px;
            opacity: 0.9;
            position: relative;
        }

        .banner-vip {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .banner-vip:hover {
            background: rgba(255,255,255,0.3);
        }

        /* ============================================================
           功能菜单
           ============================================================ */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title .more {
            font-size: 12px;
            color: var(--primary-color);
            text-decoration: none;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .feature-item {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 16px 8px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border-color);
        }

        .feature-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .feature-item .icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 8px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .feature-item span {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .icon-行业 { background: #EEF2FF; color: #4F46E5; }
        .icon-穿搭 { background: #FEF3C7; color: #D97706; }
        .icon-单品 { background: #DCFCE7; color: #16A34A; }
        .icon-禁忌 { background: #FEE2E2; color: #DC2626; }
        .icon-购物 { background: #F3E8FF; color: #9333EA; }

        /* ============================================================
           行业选择
           ============================================================ */
        .industry-section {
            margin-bottom: 24px;
        }

        .industry-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .industry-item {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
        }

        .industry-item:hover {
            border-color: var(--primary-color);
            background: #F8FAFF;
        }

        .industry-item .avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .industry-item .info {
            flex: 1;
        }

        .industry-item .name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .industry-item .desc {
            font-size: 12px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .industry-item .arrow {
            color: var(--text-light);
            font-size: 16px;
        }

        /* 行业颜色映射 */
        .bg-互联网 { background: #EEF2FF; }
        .bg-金融 { background: #FEF3C7; }
        .bg-法律 { background: #F3F4F6; }
        .bg-教育 { background: #DCFCE7; }
        .bg-医疗 { background: #FEF2F2; }
        .bg-销售 { background: #ECFDF5; }
        .bg-设计 { background: #FAF5FF; }
        .bg-国企 { background: #F1F5F9; }

        /* ============================================================
           详情页面
           ============================================================ */
        .detail-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-color);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
        }

        .detail-page.active {
            transform: translateX(0);
        }

        .detail-header {
            position: sticky;
            top: 0;
            background: var(--card-bg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            font-size: 18px;
            color: var(--text-primary);
        }

        .detail-title {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
        }

        .detail-content {
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ============================================================
           行业详情
           ============================================================ */
        .industry-detail-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            border-radius: var(--radius-lg);
            padding: 20px;
            color: white;
            margin-bottom: 20px;
        }

        .industry-detail-header h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .industry-detail-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .suggestion-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .suggestion-card h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .suggestion-list {
            list-style: none;
        }

        .suggestion-list li {
            padding: 8px 0;
            font-size: 14px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .suggestion-list li:last-child {
            border-bottom: none;
        }

        .suggestion-list li::before {
            content: '✓';
            color: var(--secondary-color);
            font-weight: bold;
            flex-shrink: 0;
        }

        .color-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .color-tag {
            padding: 6px 12px;
            background: var(--bg-color);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ============================================================
           穿搭示范卡片
           ============================================================ */
        .outfit-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .outfit-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .outfit-card h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .outfit-card .scene {
            font-size: 11px;
            color: var(--primary-color);
            background: #EEF2FF;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .outfit-items {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .outfit-item-tag {
            padding: 4px 10px;
            background: var(--bg-color);
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .outfit-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        .outfit-price {
            font-size: 14px;
            color: var(--danger-color);
            font-weight: 600;
        }

        .outfit-style {
            font-size: 11px;
            color: var(--text-light);
        }

        /* ============================================================
           单品推荐
           ============================================================ */
        .product-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .product-tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .product-tab.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 14px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .product-info {
            flex: 1;
        }

        .product-info h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-info .store {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .product-info .feature {
            font-size: 12px;
            color: var(--secondary-color);
        }

        .product-price {
            text-align: right;
        }

        .product-price .price {
            font-size: 16px;
            font-weight: 600;
            color: var(--danger-color);
        }

        /* ============================================================
           禁忌页面
           ============================================================ */
        .taboo-category {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .taboo-header {
            padding: 14px 16px;
            background: linear-gradient(135deg, #FEE2E2 0%, #FEF2F2 100%);
            font-weight: 600;
            font-size: 14px;
            color: var(--danger-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .taboo-list {
            padding: 12px 16px;
        }

        .taboo-item {
            padding: 8px 0;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: flex-start;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .taboo-item:last-child {
            border-bottom: none;
        }

        .taboo-item::before {
            content: '✗';
            color: var(--danger-color);
            font-weight: bold;
            flex-shrink: 0;
        }

        /* ============================================================
           购物页面
           ============================================================ */
        .shopping-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .shopping-card-header {
            padding: 12px 14px;
            background: linear-gradient(135deg, #F3E8FF 0%, #FAF5FF 100%);
            font-size: 12px;
            color: #9333EA;
            display: flex;
            justify-content: space-between;
        }

        .shopping-card-body {
            padding: 14px;
        }

        .shopping-card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .shopping-card .tag {
            display: inline-block;
            padding: 2px 8px;
            background: #EEF2FF;
            color: var(--primary-color);
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .shopping-prices {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .shopping-prices .original {
            font-size: 12px;
            color: var(--text-light);
            text-decoration: line-through;
        }

        .shopping-prices .discount {
            font-size: 16px;
            font-weight: 600;
            color: var(--danger-color);
        }

        .shopping-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        .commission-tag {
            font-size: 11px;
            color: var(--warning-color);
            background: #FFFBEB;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .buy-btn {
            background: linear-gradient(135deg, #9333EA 0%, #7C3AED 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .buy-btn:hover {
            transform: scale(1.05);
        }

        /* ============================================================
           VIP弹窗
           ============================================================ */
        .vip-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .vip-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .vip-modal-content {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin: 20px;
            max-width: 340px;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .vip-modal.active .vip-modal-content {
            transform: scale(1);
        }

        .vip-modal-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .vip-modal-header h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .vip-modal-header p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .vip-price {
            text-align: center;
            margin-bottom: 20px;
        }

        .vip-price .amount {
            font-size: 36px;
            font-weight: 700;
            color: var(--warning-color);
        }

        .vip-price .amount::before {
            content: '¥';
            font-size: 18px;
        }

        .vip-price .period {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .vip-benefits {
            margin-bottom: 20px;
        }

        .vip-benefits h4 {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .vip-benefits ul {
            list-style: none;
        }

        .vip-benefits li {
            padding: 6px 0;
            font-size: 13px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vip-benefits li::before {
            content: '✓';
            color: var(--secondary-color);
            font-weight: bold;
        }

        .vip-buy-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--warning-color) 0%, #F59E0B 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .vip-buy-btn:hover {
            transform: scale(1.02);
        }

        .vip-close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--bg-color);
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        /* ============================================================
           底部导航
           ============================================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 12px;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item .icon {
            font-size: 20px;
        }

        .nav-item span {
            font-size: 10px;
        }

        /* ============================================================
           Toast提示
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 13px;
            z-index: 400;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ============================================================
           加载状态
           ============================================================ */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .loading::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================================
           搜索结果
           ============================================================ */
        .search-results {
            display: none;
        }

        .search-results.active {
            display: block;
        }

        .search-result-section {
            margin-bottom: 20px;
        }

        .search-result-item {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .search-result-item:hover {
            border-color: var(--primary-color);
        }

        /* ============================================================
           响应式调整
           ============================================================ */
        @media (max-width: 360px) {
            .feature-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .feature-item {
                padding: 12px 6px;
            }
        }

        /* 隐藏默认内容 */
        .default-content.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <h1>
                👔 面试着装指南
                <span class="vip-badge" onclick="showVipModal()">开通VIP</span>
            </h1>
            <div class="user-status">
                <span id="userStatus">未开通</span>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 搜索栏 -->
        <div class="search-bar">
            <span class="icon">🔍</span>
            <input type="text" id="searchInput" placeholder="搜索行业、穿搭、单品..." onkeyup="handleSearch(event)">
        </div>

        <!-- 搜索结果 -->
        <div class="search-results" id="searchResults">
            <div class="search-result-section" id="searchIndustrySection">
                <div class="section-title">行业</div>
                <div id="searchIndustryList"></div>
            </div>
            <div class="search-result-section" id="searchOutfitSection">
                <div class="section-title">穿搭</div>
                <div id="searchOutfitList"></div>
            </div>
            <div class="search-result-section" id="searchProductSection">
                <div class="section-title">单品</div>
                <div id="searchProductList"></div>
            </div>
        </div>

        <!-- 默认内容 -->
        <div class="default-content" id="defaultContent">
            <!-- Banner -->
            <div class="banner">
                <h2>👔 面试不知道怎么穿？</h2>
                <p>根据行业特性，智能推荐最佳着装方案</p>
                <div class="banner-vip" onclick="showVipModal()">
                    ⭐ 开通VIP · 解锁全部功能
                </div>
            </div>

            <!-- 功能入口 -->
            <div class="feature-grid">
                <div class="feature-item" onclick="switchTab('industry')">
                    <div class="icon icon-行业">🏢</div>
                    <span>行业建议</span>
                </div>
                <div class="feature-item" onclick="showOutfits()">
                    <div class="icon icon-穿搭">👔</div>
                    <span>穿搭示范</span>
                </div>
                <div class="feature-item" onclick="showProducts()">
                    <div class="icon icon-单品">🎁</div>
                    <span>单品推荐</span>
                </div>
                <div class="feature-item" onclick="showTaboos()">
                    <div class="icon icon-禁忌">⚠️</div>
                    <span>着装禁忌</span>
                </div>
            </div>

            <!-- 行业选择 -->
            <div class="industry-section" id="industrySection">
                <div class="section-title">
                    选择您的目标行业
                </div>
                <div class="industry-list" id="industryList">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- 行业详情页 -->
    <div class="detail-page" id="industryDetailPage">
        <div class="detail-header">
            <button class="back-btn" onclick="closeDetailPage()">←</button>
            <div class="detail-title" id="detailTitle">行业详情</div>
        </div>
        <div class="detail-content" id="detailContent">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')">
            <span class="icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="nav-item" onclick="switchTab('outfit')">
            <span class="icon">👔</span>
            <span>穿搭</span>
        </div>
        <div class="nav-item" onclick="switchTab('product')">
            <span class="icon">🛍️</span>
            <span>好物</span>
        </div>
        <div class="nav-item" onclick="switchTab('vip')">
            <span class="icon">⭐</span>
            <span>会员</span>
        </div>
    </nav>

    <!-- VIP弹窗 -->
    <div class="vip-modal" id="vipModal">
        <div class="vip-modal-content">
            <div class="vip-modal-header">
                <h3>🌟 开通VIP会员</h3>
                <p>解锁全部高级功能</p>
            </div>
            <div class="vip-price">
                <div class="amount">9.9</div>
                <div class="period">/ 月</div>
            </div>
            <div class="vip-benefits">
                <h4>会员特权</h4>
                <ul>
                    <li>解锁全部行业着装建议</li>
                    <li>解锁全部穿搭示范</li>
                    <li>解锁全部单品推荐</li>
                    <li>专属购物折扣码</li>
                    <li>优先客服支持</li>
                </ul>
            </div>
            <button class="vip-buy-btn" onclick="purchaseVip()">立即开通 · ¥9.9/月</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================
         JavaScript逻辑
         ============================================================ -->
    <script>
        // API基础URL
        const API_BASE = 'http://localhost:5000/api';
        
        // 当前状态
        let currentUser = {
            isVip: false,
            vipExpireTime: null
        };

        let allIndustries = [];
        let allOutfits = {};
        let allProducts = {};

        // ============================================================
        // 初始化
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadIndustries();
            loadProducts();
        });

        // ============================================================
        // API请求封装
        // ============================================================
        async function apiRequest(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    ...options
                });
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('API请求失败:', error);
                // 返回模拟数据作为降级
                return getMockData(endpoint);
            }
        }

        // 模拟数据降级
        function getMockData(endpoint) {
            if (endpoint.includes('industries')) {
                return { code: 0, data: getMockIndustries() };
            }
            if (endpoint.includes('taboos')) {
                return { code: 0, data: getMockTaboos() };
            }
            return { code: 0, data: [] };
        }

        // ============================================================
        // 加载行业列表
        // ============================================================
        async function loadIndustries() {
            const result = await apiRequest('/industries');
            if (result.code === 0) {
                allIndustries = result.data;
                renderIndustries(result.data);
            }
        }

        function renderIndustries(industries) {
            const container = document.getElementById('industryList');
            container.innerHTML = industries.map(ind => `
                <div class="industry-item" onclick="showIndustryDetail('${ind.id}')">
                    <div class="avatar bg-${ind.id}">${getIndustryEmoji(ind.id)}</div>
                    <div class="info">
                        <div class="name">${ind.name}</div>
                        <div class="desc">${ind.description}</div>
                    </div>
                    <div class="arrow">›</div>
                </div>
            `).join('');
        }

        function getIndustryEmoji(id) {
            const emojis = {
                '互联网': '💻',
                '金融': '💰',
                '法律': '⚖️',
                '教育': '📚',
                '医疗': '🏥',
                '销售': '💼',
                '设计': '🎨',
                '国企': '🏛️'
            };
            return emojis[id] || '🏢';
        }

        // ============================================================
        // 加载单品
        // ============================================================
        async function loadProducts() {
            const result = await apiRequest('/products');
            if (result.code === 0 && result.data.categories) {
                allProducts = result.data;
            }
        }

        // ============================================================
        // 行业详情
        // ============================================================
        async function showIndustryDetail(industryId) {
            const page = document.getElementById('industryDetailPage');
            const title = document.getElementById('detailTitle');
            const content = document.getElementById('detailContent');
            
            page.classList.add('active');
            title.textContent = '加载中...';
            content.innerHTML = '<div class="loading">加载中...</div>';

            const result = await apiRequest(`/industry/${industryId}`);
            
            if (result.code === 0) {
                const data = result.data;
                title.textContent = data.name;
                content.innerHTML = `
                    <div class="industry-detail-header">
                        <h2>${data.name}</h2>
                        <p>${data.description}</p>
                        <p style="margin-top:8px; font-size:12px;">氛围：${data.atmosphere}</p>
                    </div>
                    
                    <div class="suggestion-card">
                        <h3>💡 着装建议</h3>
                        <ul class="suggestion-list">
                            ${data.suggestions.map(s => `<li>${s}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <div class="suggestion-card">
                        <h3>🎨 推荐颜色</h3>
                        <div class="color-tags">
                            ${data.colors.map(c => `<span class="color-tag">${c}</span>`).join('')}
                        </div>
                    </div>
                    
                    ${data.outfits && data.outfits.length > 0 ? `
                        <div class="section-title" style="margin-top:20px;">👔 该行业穿搭示范</div>
                        ${data.outfits.map(outfit => `
                            <div class="outfit-card">
                                <div class="outfit-card-header">
                                    <h4>${outfit.title}</h4>
                                    <span class="scene">${outfit.scene}</span>
                                </div>
                                <div class="outfit-items">
                                    ${outfit.items.map(item => `<span class="outfit-item-tag">${item}</span>`).join('')}
                                </div>
                                <div class="outfit-footer">
                                    <span class="outfit-price">${outfit.price_range}</span>
                                    <span class="outfit-style">${outfit.style}</span>
                                </div>
                            </div>
                        `).join('')}
                    ` : ''}
                `;
            }
        }

        // ============================================================
        // 穿搭示范
        // ============================================================
        async function showOutfits() {
            const page = document.getElementById('industryDetailPage');
            const title = document.getElementById('detailTitle');
            const content = document.getElementById('detailContent');
            
            page.classList.add('active');
            title.textContent = '穿搭示范';
            content.innerHTML = '<div class="loading">加载中...</div>';

            const result = await apiRequest('/outfits');
            
            if (result.code === 0) {
                allOutfits = result.data;
                let html = '';
                
                // 添加行业筛选标签
                const categories = Object.keys(result.data);
                html += `<div class="product-tabs">
                    <div class="product-tab active" onclick="filterOutfits('all')">全部</div>
                    ${categories.filter(c => c !== '通用').map(c => `
                        <div class="product-tab" onclick="filterOutfits('${c}')">${c}</div>
                    `).join('')}
                </div>`;
                
                // 渲染所有穿搭
                categories.forEach(cat => {
                    html += `
                        <div class="search-result-section outfit-category" data-category="${cat}">
                            ${cat !== '通用' ? `<div class="section-title">${cat}</div>` : ''}
                            ${result.data[cat].map(outfit => `
                                <div class="outfit-card">
                                    <div class="outfit-card-header">
                                        <h4>${outfit.title}</h4>
                                        <span class="scene">${outfit.scene}</span>
                                    </div>
                                    <div class="outfit-items">
                                        ${outfit.items.map(item => `<span class="outfit-item-tag">${item}</span>`).join('')}
                                    </div>
                                    <div class="outfit-footer">
                                        <span class="outfit-price">${outfit.price_range}</span>
                                        <span class="outfit-style">${outfit.style}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                });
                
                content.innerHTML = html;
            }
        }

        function filterOutfits(category) {
            // 更新标签状态
            document.querySelectorAll('.product-tabs .product-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent === category || (category === 'all' && tab.textContent === '全部')) {
                    tab.classList.add('active');
                }
            });
            
            // 筛选显示
            document.querySelectorAll('.outfit-category').forEach(section => {
                if (category === 'all' || section.dataset.category === category) {
                    section.style.display = 'block';
                } else {
                    section.style.display = 'none';
                }
            });
        }

        // ============================================================
        // 单品推荐
        // ============================================================
        async function showProducts() {
            const page = document.getElementById('industryDetailPage');
            const title = document.getElementById('detailTitle');
            const content = document.getElementById('detailContent');
            
            page.classList.add('active');
            title.textContent = '单品推荐';
            content.innerHTML = '<div class="loading">加载中...</div>';

            const result = await apiRequest('/products');
            
            if (result.code === 0) {
                const categories = result.data.categories || [];
                const products = result.data.products || {};
                
                let html = `<div class="product-tabs">
                    <div class="product-tab active" onclick="filterProducts('all')">全部</div>
                    ${categories.map(cat => `
                        <div class="product-tab" onclick="filterProducts('${cat}')">${cat}</div>
                    `).join('')}
                </div>`;
                
                categories.forEach(cat => {
                    html += `
                        <div class="search-result-section product-category" data-category="${cat}">
                            <div class="section-title">${cat}</div>
                            ${(products[cat] || []).map(prod => `
                                <div class="product-card">
                                    <div class="product-info">
                                        <h4>${prod.name}</h4>
                                        <div class="store">${prod.store}</div>
                                        <div class="feature">${prod.feature}</div>
                                    </div>
                                    <div class="product-price">
                                        <div class="price">${prod.price}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                });
                
                content.innerHTML = html;
            }
        }

        function filterProducts(category) {
            document.querySelectorAll('.product-tabs .product-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent === category || (category === 'all' && tab.textContent === '全部')) {
                    tab.classList.add('active');
                }
            });
            
            document.querySelectorAll('.product-category').forEach(section => {
                if (category === 'all' || section.dataset.category === category) {
                    section.style.display = 'block';
                } else {
                    section.style.display = 'none';
                }
            });
        }

        // ============================================================
        // 着装禁忌
        // ============================================================
        async function showTaboos() {
            const page = document.getElementById('industryDetailPage');
            const title = document.getElementById('detailTitle');
            const content = document.getElementById('detailContent');
            
            page.classList.add('active');
            title.textContent = '着装禁忌';
            content.innerHTML = '<div class="loading">加载中...</div>';

            const result = await apiRequest('/taboos');
            
            if (result.code === 0) {
                content.innerHTML = result.data.map(taboo => `
                    <div class="taboo-category">
                        <div class="taboo-header">⚠️ ${taboo.category}</div>
                        <div class="taboo-list">
                            ${taboo.禁忌.map(t => `<div class="taboo-item">${t}</div>`).join('')}
                        </div>
                    </div>
                `).join('');
            }
        }

        // ============================================================
        // 购物链接
        // ============================================================
        async function showShopping() {
            const page = document.getElementById('industryDetailPage');
            const title = document.getElementById('detailTitle');
            const content = document.getElementById('detailContent');
            
            page.classList.add('active');
            title.textContent = '购物推荐';
            content.innerHTML = '<div class="loading">加载中...</div>';

            const result = await apiRequest('/shopping');
            
            if (result.code === 0) {
                content.innerHTML = result.data.map(item => `
                    <div class="shopping-card">
                        <div class="shopping-card-header">
                            <span>${item.category}</span>
                            <span>返 ${item.commission}</span>
                        </div>
                        <div class="shopping-card-body">
                            <h4>${item.name}</h4>
                            <span class="tag">${item.tag}</span>
                            <div class="shopping-prices">
                                <span class="original">¥${item.original_price}</span>
                                <span class="discount">¥${item.discount_price}</span>
                            </div>
                            <div class="shopping-card-footer">
                                <span class="commission-tag">预计返 ¥${item.commission}</span>
                                <button class="buy-btn" onclick="buyProduct('${item.link}')">去购买</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function buyProduct(link) {
            showToast('即将跳转到购买页面...');
            // 实际场景中这里会打开链接或跳转
        }

        // ============================================================
        // 搜索功能
        // ============================================================
        let searchTimeout;
        async function handleSearch(event) {
            const keyword = event.target.value.trim();
            
            clearTimeout(searchTimeout);
            
            if (!keyword) {
                document.getElementById('searchResults').classList.remove('active');
                document.getElementById('defaultContent').classList.remove('hidden');
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                const result = await apiRequest(`/search?keyword=${encodeURIComponent(keyword)}`);
                
                document.getElementById('defaultContent').classList.add('hidden');
                document.getElementById('searchResults').classList.add('active');
                
                // 渲染行业结果
                const industrySection = document.getElementById('searchIndustrySection');
                const industryList = document.getElementById('searchIndustryList');
                if (result.data.industries && result.data.industries.length > 0) {
                    industrySection.style.display = 'block';
                    industryList.innerHTML = result.data.industries.map(ind => `
                        <div class="search-result-item" onclick="showIndustryDetail('${ind.id}')">
                            <strong>${ind.name}</strong>
                            <div style="font-size:12px;color:#64748B;margin-top:4px;">${ind.description}</div>
                        </div>
                    `).join('');
                } else {
                    industrySection.style.display = 'none';
                }
                
                // 渲染穿搭结果
                const outfitSection = document.getElementById('searchOutfitSection');
                const outfitList = document.getElementById('searchOutfitList');
                if (result.data.outfits && result.data.outfits.length > 0) {
                    outfitSection.style.display = 'block';
                    outfitList.innerHTML = result.data.outfits.map(outfit => `
                        <div class="search-result-item">
                            <strong>${outfit.title}</strong>
                            <div style="font-size:12px;color:#64748B;margin-top:4px;">${outfit.scene} | ${outfit.price_range}</div>
                        </div>
                    `).join('');
                } else {
                    outfitSection.style.display = 'none';
                }
                
                // 渲染单品结果
                const productSection = document.getElementById('searchProductSection');
                const productList = document.getElementById('searchProductList');
                if (result.data.products && result.data.products.length > 0) {
                    productSection.style.display = 'block';
                    productList.innerHTML = result.data.products.map(prod => `
                        <div class="search-result-item">
                            <strong>${prod.name}</strong>
                            <div style="font-size:12px;color:#64748B;margin-top:4px;">${prod.store} | ${prod.price}</div>
                        </div>
                    `).join('');
                } else {
                    productSection.style.display = 'none';
                }
            }, 300);
        }

        // ============================================================
        // 标签页切换
        // ============================================================
        function switchTab(tab) {
            // 更新底部导航
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const navItems = document.querySelectorAll('.nav-item');
            const tabMap = { 'home': 0, 'outfit': 1, 'product': 2, 'vip': 3 };
            if (tabMap[tab] !== undefined) {
                navItems[tabMap[tab]].classList.add('active');
            }
            
            // 关闭详情页
            closeDetailPage();
            
            // 显示对应内容
            document.getElementById('searchResults').classList.remove('active');
            document.getElementById('defaultContent').classList.remove('hidden');
            document.getElementById('searchInput').value = '';
            
            switch(tab) {
                case 'outfit':
                    showOutfits();
                    break;
                case 'product':
                    showShopping();
                    break;
                case 'vip':
                    showVipModal();
                    break;
                default:
                    document.getElementById('defaultContent').classList.add('hidden');
                    document.getElementById('defaultContent').classList.remove('hidden');
            }
        }

        // ============================================================
        // 关闭详情页
        // ============================================================
        function closeDetailPage() {
            document.getElementById('industryDetailPage').classList.remove('active');
        }

        // ============================================================
        // VIP功能
        // ============================================================
        function showVipModal() {
            document.getElementById('vipModal').classList.add('active');
        }

        function hideVipModal() {
            document.getElementById('vipModal').classList.remove('active');
        }

        async function purchaseVip() {
            showToast('正在唤醒支付...');
            
            // 模拟支付
            try {
                const response = await fetch(`${API_BASE}/vip/purchase`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ payment_method: 'alipay' })
                });
                
                if (response.ok) {
                    currentUser.isVip = true;
                    document.getElementById('userStatus').textContent = 'VIP会员';
                    hideVipModal();
                    showToast('🎉 开通成功！欢迎成为VIP');
                } else {
                    showToast('支付失败，请重试');
                }
            } catch (e) {
                // 模拟成功
                currentUser.isVip = true;
                document.getElementById('userStatus').textContent = 'VIP会员';
                hideVipModal();
                showToast('🎉 开通成功！欢迎成为VIP');
            }
        }

        // 点击弹窗背景关闭
        document.getElementById('vipModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hideVipModal();
            }
        });

        // ============================================================
        // Toast提示
        // ============================================================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ============================================================
        // 模拟数据
        // ============================================================
        function getMockIndustries() {
            return [
                { id: '互联网', name: '互联网/科技', description: '互联网行业相对开放，但面试重要岗位仍需得体', atmosphere: '轻松但专业' },
